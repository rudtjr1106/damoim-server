# ── 공통 설정 (모든 프로파일 공유) ──
# 접속정보는 전부 환경변수로 주입한다(하드코딩 금지) → 로컬/AWS 코드 무수정 이식.
# 환경변수가 없을 때의 기본값(:뒤)은 로컬 docker-compose 기준.
spring:
  application:
    name: damoim-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/damoim}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # 스키마 생성/변경은 Flyway가 전담 — Hibernate는 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# 헬스체크 (로컬 확인 + AWS 로드밸런서 타겟)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
