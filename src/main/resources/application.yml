# ── 공통 설정 (모든 프로파일 공유) ──
# 접속정보는 전부 환경변수로 주입한다(하드코딩 금지) → 로컬/AWS 코드 무수정 이식.
# 환경변수가 없을 때의 기본값(:뒤)은 로컬 docker-compose 기준.
spring:
  application:
    name: damoim-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/damoim}
    username: ${DB_USERNAME}          # 기본값 없음 — 프로파일(local/prod)에서 주입, 미설정 시 부팅 실패
    password: ${DB_PASSWORD}          # 커밋된 기본 자격증명 제거(보안 리뷰)
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # 스키마 생성/변경은 Flyway가 전담 — Hibernate는 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# 헬스체크 (로컬 확인 + AWS 로드밸런서 타겟)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    # 413 조기 응답 후 클라가 계속 밀어넣는 본문을 무한 drain하지 않도록 상한(바디 상한 강제용 아님)
    max-swallow-size: 2097152   # 2MB

# ── 앱 보안 설정 ──
app:
  jwt:
    # HS256 서명 키. 운영에서는 반드시 JWT_SECRET 환경변수로 주입(최소 32바이트).
    # 기본값은 비워둠 → 미주입 시 부팅 실패(fail-fast). 로컬은 application-local.yml에서 주입.
    secret: ${JWT_SECRET:}
    access-token-ttl: ${JWT_ACCESS_TTL:PT30M}      # 액세스 토큰 30분
    refresh-token-ttl: ${JWT_REFRESH_TTL:P14D}     # 리프레시 토큰 14일
    issuer: damoim
  kakao:
    user-info-url: ${KAKAO_USER_INFO_URL:https://kapi.kakao.com/v2/user/me}
    token-info-url: ${KAKAO_TOKEN_INFO_URL:https://kapi.kakao.com/v1/user/access_token_info}
    # 우리 카카오 앱 식별자. 미주입(0) 시 부팅 실패 — 토큰 발급 대상 앱 검증(confused-deputy 방지)에 필수.
    app-id: ${KAKAO_APP_ID:0}
  storage:
    provider: ${STORAGE_PROVIDER:local}                  # local(개발 실동작 디스크) | s3
    quota-bytes: ${STORAGE_QUOTA_BYTES:5368709120}       # 동아리당 5GB
    presign-expiry-seconds: ${STORAGE_PRESIGN_EXPIRY:600}
    local:
      # provider=local의 presigned URL 베이스. 비우면 요청 주소에서 파생(프록시 뒤=X-Forwarded-* 반영).
      # 실기기에서 host가 어긋나면 명시(예: https://xxx.ts.net).
      base-url: ${STORAGE_LOCAL_BASE_URL:}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:ap-northeast-2}
    orphan-sweep:
      enabled: ${STORAGE_ORPHAN_SWEEP:false}          # S3 orphan 정리 배치(운영 S3에서만 켬)
      grace-hours: ${STORAGE_ORPHAN_GRACE_HOURS:24}    # 최근 업로드(등록 대기) 보호 유예
      cron: ${STORAGE_ORPHAN_CRON:0 0 4 * * *}         # 매일 04:00
  request:
    max-body-bytes: ${MAX_BODY_BYTES:1048576}            # JSON 요청 본문 상한 1MB(DoS 방지)
  billing:
    verify-purchases: ${BILLING_VERIFY:false}            # 구독 시 스토어 결제 증빙 재검증(운영=true, fail-closed)
    standard-product-id: ${BILLING_STANDARD_PRODUCT:com.damoim.app.subscription.standard}
    pro-product-id: ${BILLING_PRO_PRODUCT:com.damoim.app.subscription.pro}
    apple:
      bundle-id: ${APPLE_BUNDLE_ID:}                     # 앱 번들 ID(JWS bundleId 대조)
      root-cert-path: ${APPLE_ROOT_CERT_PATH:}           # Apple 루트 CA(AppleRootCA-G3.cer) 경로. 미설정=검증 불가
