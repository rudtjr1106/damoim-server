# ── 집 PC 24/7 배포용 (DB + 앱) ──
# 외부 노출(폰 외부망)은 호스트에서 도는 Tailscale Funnel이 담당한다(도메인 불필요). DEPLOY.md 참고.
#
#   cp .env.prod.example .env      # 값 채우기(.env는 커밋 금지)
#   docker compose -f docker-compose.prod.yml up -d --build
#   tailscale funnel --bg 8080     # 호스트에서 한 번 → 고정 https 주소 발급
#
# 재부팅/크래시에도 restart: always 로 자동 복구, DB는 볼륨에 영구 보존.
services:
  postgres:
    image: postgres:16
    container_name: damoim-postgres
    environment:
      POSTGRES_DB: damoim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
    volumes:
      - damoim-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d damoim"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  app:
    build: .
    container_name: damoim-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/damoim   # 컨테이너끼리는 서비스명(postgres)으로 통신
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 필요 — .env에 32바이트+ 고정값}
      KAKAO_APP_ID: ${KAKAO_APP_ID:?KAKAO_APP_ID 필요 — 카카오 숫자 앱ID(>0)}
      # ── 파일 업로드(자료실)를 실제로 쓸 때만 S3 (선택). 미설정 시 로컬 스텁(실업로드 X) ──
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    # 호스트 localhost에만 매핑 → Tailscale Funnel(호스트)이 localhost:8080을 외부로 프록시.
    # 같은 WiFi에서 LAN IP로도 직접 붙고 싶으면 "8080:8080" 으로 바꾼다.
    ports:
      - "127.0.0.1:8080:8080"
    restart: always

volumes:
  damoim-pgdata:
